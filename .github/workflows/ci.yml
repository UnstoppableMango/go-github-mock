name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-go@v5.6.0
        with:
          go-version-file: go.mod

      - run: go build ./...

      - run: go test ./...

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: cachix/install-nix-action@v31.9.1
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - run: nix flake check

  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: cachix/install-nix-action@v31.9.1
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - run: nix run .#gomod2nix -- generate

      - run: git diff --exit-code
